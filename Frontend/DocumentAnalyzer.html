<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Document Analyzer - AI-Powered Analysis</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 968px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-zone {
      border: 2px dashed #667eea;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-zone:hover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .upload-zone.dragging {
      border-color: #764ba2;
      background: #e8ebff;
      transform: scale(1.02);
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .file-list {
      margin-top: 16px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #f8f9ff;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .file-name {
      font-weight: 500;
      color: #333;
    }

    .file-size {
      font-size: 0.85rem;
      color: #666;
    }

    .remove-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .remove-btn:hover {
      background: #ee5a6f;
    }

    .chat-container {
      height: 500px;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f8f9ff;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .message {
      margin-bottom: 16px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      text-align: right;
    }

    .message-content {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .message.assistant .message-content {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .message.system .message-content {
      background: #fff3cd;
      color: #856404;
      font-size: 0.9rem;
    }

    .message.error .message-content {
      background: #ffe0e0;
      color: #d63031;
      font-size: 0.9rem;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .send-btn, .analyze-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .send-btn:hover, .analyze-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    .send-btn:disabled, .analyze-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .quick-btn {
      padding: 12px;
      background: #f8f9ff;
      border: 2px solid #667eea;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      color: #667eea;
      font-weight: 500;
    }

    .quick-btn:hover {
      background: #667eea;
      color: white;
    }

    .quick-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #f8f9ff;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #666;
    }

    input[type="file"] {
      display: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      background: #667eea;
      color: white;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const API_BASE = "https://docsage-pwk8.onrender.com";

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function FinancialAnalyzer() {
      const [files, setFiles] = useState([]);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [indexing, setIndexing] = useState(false);
      const [isDragging, setIsDragging] = useState(false);
      // docId is what the backend uses to look up the indexed chunks for
      // this document. Once we have it, chat questions send this instead
      // of re-sending the whole document every time.
      const [docId, setDocId] = useState(null);
      const [stats, setStats] = useState({ files: 0, pages: 0, queries: 0, chunks: 0 });
      const fileInputRef = useRef(null);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const extractTextFromPDF = async (file) => {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(' ');
          fullText += `\n--- Page ${i} ---\n${pageText}\n`;
        }

        setStats(prev => ({ ...prev, pages: prev.pages + pdf.numPages }));
        return fullText;
      };

      const addMessage = (content, role = 'assistant') => {
        setMessages(prev => [...prev, { role, content, timestamp: Date.now() }]);
      };

      // After extracting text client-side, send it to the backend to be
      // chunked and stored. This is fast (no AI calls involved) — it just
      // splits text and hands back a docId we can reference later.
      const indexDocument = async (extractedText) => {
        setIndexing(true);
        addMessage(`Indexing document, one moment...`, 'system');

        try {
          const res = await fetch(`${API_BASE}/api/index`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: extractedText })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Indexing failed");

          setDocId(data.docId);
          setStats(prev => ({ ...prev, chunks: data.numChunks }));
          addMessage(`Document ready! (${data.numChunks} sections indexed). Ask me anything about it.`, 'system');
        } catch (err) {
          console.error('Indexing error:', err);
          addMessage(`Error indexing document: ${err.message}. Make sure your backend server is running at ${API_BASE}`, 'error');
        } finally {
          setIndexing(false);
        }
      };

      const handleFileUpload = async (selectedFiles) => {
        const newFiles = Array.from(selectedFiles);
        setFiles(prev => [...prev, ...newFiles]);
        setStats(prev => ({ ...prev, files: prev.files + newFiles.length }));

        let combinedText = '';

        for (const file of newFiles) {
          if (file.type === 'application/pdf') {
            addMessage(`Extracting text from ${file.name}...`, 'system');
            const text = await extractTextFromPDF(file);
            combinedText += `\n\n=== ${file.name} ===\n${text}`;
          } else if (file.type === 'text/plain' || file.name.endsWith('.csv')) {
            const text = await file.text();
            combinedText += `\n\n=== ${file.name} ===\n${text}`;
          }
        }

        if (combinedText.trim()) {
          await indexDocument(combinedText);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        handleFileUpload(e.dataTransfer.files);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        setIsDragging(true);
      };

      const handleDragLeave = () => {
        setIsDragging(false);
      };

      const removeFile = (index) => {
        setFiles(prev => prev.filter((_, i) => i !== index));
        setStats(prev => ({ ...prev, files: prev.files - 1 }));
      };

      // Sends just the question + docId. The backend looks up the most
      // relevant chunks for this docId and builds the prompt itself, so
      // we never ship the whole document over the wire per question.
      const callChatAPI = async (userQuery) => {
        try {
          const response = await fetch(`${API_BASE}/api/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              query: userQuery,
              docId: docId
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || `HTTP error! status: ${response.status}`);
          }

          const contentType = response.headers.get("content-type");
          if (!contentType || !contentType.includes("application/json")) {
            const text = await response.text();
            console.error('Non-JSON response:', text);
            throw new Error('Server returned non-JSON response. Make sure your backend server is running at ' + API_BASE);
          }

          const data = await response.json();

          if (data.response) {
            return data.response;
          } else if (data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
          } else {
            console.error('Unexpected response format:', data);
            throw new Error('Unexpected API response format');
          }
        } catch (error) {
          console.error('API Error:', error);

          if (error.message.includes('Failed to fetch')) {
            throw new Error('Cannot connect to backend server. Please ensure:\n1. Your backend server is running at ' + API_BASE + '\n2. CORS is enabled on your backend\n3. The /api/chat endpoint exists');
          }

          throw error;
        }
      };

      const handleSend = async () => {
        if (!input.trim() || loading) return;

        if (!docId) {
          addMessage('Please upload and wait for a document to finish indexing first.', 'system');
          return;
        }

        const userMessage = input.trim();
        setInput('');
        addMessage(userMessage, 'user');
        setLoading(true);
        setStats(prev => ({ ...prev, queries: prev.queries + 1 }));

        try {
          const response = await callChatAPI(userMessage);
          addMessage(response, 'assistant');
        } catch (error) {
          addMessage(`Error: ${error.message}`, 'error');
          console.error('Full error:', error);
        } finally {
          setLoading(false);
        }
      };

      const handleQuickAction = (query) => {
        setInput(query);
      };

      const quickActions = [
        '📊 Summarize key financial metrics',
        '💰 Extract revenue and expenses',
        '📈 Identify financial trends',
        '⚠️ Highlight risks and concerns',
        '🎯 Calculate financial ratios',
        '📋 List all transactions'
      ];

      const busy = loading || indexing;

      return (
        <div className="container">
          <div className="header">
            <h1>💼 Financial Document Analyzer</h1>
            <p>AI-Powered Analysis with RAG Technology</p>
          </div>

          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-value">{stats.files}</div>
              <div className="stat-label">Documents</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{stats.pages}</div>
              <div className="stat-label">Pages</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{stats.chunks}</div>
              <div className="stat-label">Indexed Sections</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{stats.queries}</div>
              <div className="stat-label">Queries</div>
            </div>
          </div>

          <div className="main-content">
            <div className="card">
              <h2>📁 Upload Documents</h2>

              <div
                className={`upload-zone ${isDragging ? 'dragging' : ''}`}
                onClick={() => fileInputRef.current?.click()}
                onDrop={handleDrop}
                onDragOver={handleDragOver}
                onDragLeave={handleDragLeave}
              >
                <div className="upload-icon">📄</div>
                <p style={{ marginBottom: '8px', fontWeight: '500' }}>
                  Drag & drop files here or click to browse
                </p>
                <p style={{ fontSize: '0.85rem', color: '#666' }}>
                  Supported: PDF, TXT, CSV
                </p>
              </div>

              <input
                ref={fileInputRef}
                type="file"
                multiple
                accept=".pdf,.txt,.csv"
                onChange={(e) => handleFileUpload(e.target.files)}
              />

              {files.length > 0 && (
                <div className="file-list">
                  {files.map((file, index) => (
                    <div key={index} className="file-item">
                      <div className="file-info">
                        <span>📄</span>
                        <div>
                          <div className="file-name">{file.name}</div>
                          <div className="file-size">
                            {(file.size / 1024).toFixed(2)} KB
                          </div>
                        </div>
                      </div>
                      <button
                        className="remove-btn"
                        onClick={() => removeFile(index)}
                      >
                        Remove
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="card">
              <h2>💬 Ask Questions <span className="badge">RAG Enabled</span></h2>

              <div className="chat-container">
                <div className="messages">
                  {messages.length === 0 ? (
                    <div style={{ textAlign: 'center', color: '#666', padding: '40px 20px' }}>
                      <p>Upload documents and start asking questions!</p>
                      <p style={{ fontSize: '0.9rem', marginTop: '8px' }}>
                        I'll analyze your financial documents and provide detailed insights.
                      </p>
                    </div>
                  ) : (
                    messages.map((msg, idx) => (
                      <div key={idx} className={`message ${msg.role}`}>
                        <div className="message-content">
                          {msg.content}
                        </div>
                      </div>
                    ))
                  )}
                  {busy && (
                    <div className="message assistant">
                      <div className="message-content">
                        <div className="loading"></div> {indexing ? 'Indexing...' : 'Analyzing...'}
                      </div>
                    </div>
                  )}
                  <div ref={messagesEndRef} />
                </div>

                <div className="input-area">
                  <input
                    type="text"
                    className="chat-input"
                    placeholder="Ask about your financial documents..."
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                    disabled={busy}
                  />
                  <button
                    className="send-btn"
                    onClick={handleSend}
                    disabled={busy || !input.trim()}
                  >
                    {loading ? '...' : 'Send'}
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div className="card">
            <h2>⚡ Quick Actions</h2>
            <div className="quick-actions">
              {quickActions.map((action, idx) => (
                <button
                  key={idx}
                  className="quick-btn"
                  onClick={() => handleQuickAction(action)}
                  disabled={!docId}
                >
                  {action}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<FinancialAnalyzer />, document.getElementById('root'));
  </script>
</body>
</html>
